<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Borders Presentation</title>
    
    <!-- Load React, ReactDOM, Babel, and Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Presentation = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            // NEUTRALIZED CONTENT & FIXED SYNTAX ERRORS
            const slides =[
                {
                    title: "The Legacy of Colonial Borders",
                    subtitle: "Historical Boundaries and Modern Geopolitics",
                    content:[
                        "Borders drawn by external administrative powers.",
                        "Consolidation of diverse populations into new states.",
                        "Long-term geopolitical and social impacts."
                    ],
                    type: "intro",
                    image: "https://images.unsplash.com/photo-1526778548025-fa2f459cd5ce?auto=format&fit=crop&q=80&w=800"
                },
                {
                    title: "Administrative Frameworks",
                    subtitle: "The Logic of Imperial Mapmaking",
                    content:[
                        "Boundaries were often drawn far from the affected regions.",
                        "Administrative efficiency frequently prioritized over local demographics.",
                        "Diverse ethnic and linguistic groups were consolidated into single territories.",
                        "Historical trade routes and nomadic patterns were often disrupted."
                    ],
                    type: "content",
                    image: "https://images.unsplash.com/photo-1521295121812-af4657139139?auto=format&fit=crop&q=80&w=800"
                },
                {
                    title: "The Middle East",
                    subtitle: "The British Mandate Period",
                    content:[
                        "British Mandate for Palestine (1920–1948).",
                        "Overlapping territorial promises to different national movements.",
                        "Complex interplay of historical claims and new administrative lines.",
                        "Contributed to long-standing regional disputes still active today."
                    ],
                    type: "content",
                    image: "https://upload.wikimedia.org/wikipedia/commons/b/bd/BritishMandatePalestine1920.png"
                },
                {
                    title: "South Asia",
                    subtitle: "The Radcliffe Line (1947)",
                    content:[
                        "Partition of British India into India and Pakistan.",
                        "Borders drawn by the Radcliffe Boundary Commission in a compressed timeframe.",
                        "Divided the culturally integrated provinces of Punjab and Bengal.",
                        "Resulted in massive displacement (approx. 15 million) and significant casualties."
                    ],
                    type: "content",
                    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Partition_of_India-en.svg/800px-Partition_of_India-en.svg.png"
                },
                {
                    title: "The Himalayan Divide",
                    subtitle: "Sino-Indian Border Disputes",
                    content:[
                        "The McMahon Line proposed at the 1914 Simla Convention.",
                        "Relied on vague geographical markers in difficult, high-altitude terrain.",
                        "Never formally recognized by all parties involved.",
                        "Has led to periodic military standoffs and border conflicts."
                    ],
                    type: "content",
                    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/McMahon_Line.png/800px-McMahon_Line.png"
                },
                {
                    title: "Sub-Saharan Africa",
                    subtitle: "Post-Berlin Conference Boundaries",
                    content:[
                        "1884 Berlin Conference formalized European territorial claims.",
                        "Resulting borders frequently bisected existing cultural and linguistic groups.",
                        "Grouped historically distinct societies into single nation-states.",
                        "Ongoing tension between inherited colonial maps and local realities."
                    ],
                    type: "content",
                    image: "https://upload.wikimedia.org/wikipedia/commons/5/52/Africa_ethnic_groups_1996.jpg",
                    secondaryLink: "https://worldmap.harvard.edu/data/geonode:murdock_ea_30"
                }
            ];

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);

            // RESTORED UI STRUCTURE
            return (
                <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-4 font-sans">
                    <div className="w-full max-w-6xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700 flex flex-col relative" style={{ minHeight: '650px' }}>
                        
                        {/* Progress Bar */}
                        <div className="absolute top-0 left-0 w-full h-1 bg-slate-700 z-10">
                            <div 
                                className="h-full bg-blue-500 transition-all duration-300" 
                                style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}
                            />
                        </div>

                        {/* Slide Layout */}
                        <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                            
                            {/* Text Content Area */}
                            <div className={`flex-1 flex flex-col justify-center p-8 lg:p-12 ${slides[currentSlide].image ? 'md:w-1/2' : 'w-full text-center'}`}>
                                <div className={`mb-4 opacity-80 uppercase tracking-widest text-xs font-bold text-blue-400 ${!slides[currentSlide].image ? 'mx-auto' : ''}`}>
                                    Slide {currentSlide + 1} of {slides.length}
                                </div>
                                
                                <h1 className="text-4xl lg:text-5xl font-black mb-4 tracking-tight leading-tight">
                                    {slides[currentSlide].title}
                                </h1>
                                
                                <h2 className="text-xl text-slate-400 mb-8 font-medium italic">
                                    {slides[currentSlide].subtitle}
                                </h2>

                                <div className={`space-y-4 ${!slides[currentSlide].image ? 'max-w-2xl mx-auto' : ''}`}>
                                    {slides[currentSlide].content.map((text, idx) => (
                                        <div key={idx} className={`flex items-start space-x-3 text-lg lg:text-xl font-light ${!slides[currentSlide].image ? 'justify-center text-center' : ''}`}>
                                            <span className="h-1.5 w-1.5 bg-blue-500 rounded-full flex-shrink-0 mt-3" />
                                            <p>{text}</p>
                                        </div>
                                    ))}
                                </div>

                                {slides[currentSlide].secondaryLink && (
                                    <div className="mt-8">
                                        <a 
                                            href={slides[currentSlide].secondaryLink} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg font-semibold transition-all transform hover:scale-105"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                                            View Harvard Murdock Map
                                        </a>
                                    </div>
                                )}
                            </div>

                            {/* Image Area */}
                            {slides[currentSlide].image && (
                                <div className="md:w-1/2 bg-slate-900 flex items-center justify-center p-6 relative group border-l border-slate-700">
                                    <img 
                                        src={slides[currentSlide].image} 
                                        alt={slides[currentSlide].title}
                                        className="max-h-full max-w-full object-contain rounded-lg shadow-2xl border border-slate-700/50"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.nextSibling.style.display = 'flex';
                                        }}
                                    />
                                    {/* Fallback if image fails to load */}
                                    <div className="hidden absolute inset-0 flex-col items-center justify-center text-slate-500 bg-slate-900 p-8 text-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mb-4 opacity-20"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                        <p className="text-sm">Image preview blocked or link expired.</p>
                                        <a href={slides[currentSlide].image} target="_blank" rel="noreferrer" className="text-blue-400 underline mt-2 text-xs">Open Original Link</a>
                                    </div>
                                    <div className="absolute bottom-4 right-4 opacity-0 group-hover:opacity-60 transition-opacity bg-black px-2 py-1 rounded text-[10px] text-white">
                                        Source: Historical Archive
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Navigation Buttons */}
                        <div className="flex justify-between items-center p-4 bg-slate-800 border-t border-slate-700 z-10 shadow-inner">
                            <button 
                                onClick={prevSlide}
                                className="p-3 rounded-full hover:bg-slate-700 text-white transition-all active:scale-90"
                                aria-label="Previous Slide"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                            
                            <div className="text-slate-400 text-xs font-mono uppercase tracking-[0.2em] hidden sm:block">
                                {slides[currentSlide].title}
                            </div>

                            <button 
                                onClick={nextSlide}
                                className="p-3 rounded-full hover:bg-slate-700 text-white transition-all active:scale-90"
                                aria-label="Next Slide"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="mt-6 text-slate-500 text-[10px] flex items-center gap-2 uppercase tracking-widest opacity-60">
                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
                        Images loaded via external CDN/Wiki. Interactive Map Presentation.
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Presentation />);
    </script>
</body>
</html>
